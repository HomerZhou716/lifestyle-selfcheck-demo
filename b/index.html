<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>习惯陪伴员工作台 · 生活方式自检</title>
<style>
:root{
  --bbg:#0f1419; --bpanel:#1a212b; --bpanel2:#212b38; --bline:#2c3846;
  --bink:#e7edf3; --bink2:#a9b7c6; --bink3:#6b7a8d;
  --brand:#2f9d84; --brand2:#63c2ab; --bgood:#22c55e; --bwarn:#f59e0b; --bbad:#ef4444;
  --bshadow:0 8px 30px rgba(0,0,0,.35);
  --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
  --serif:'Songti SC','STSong','Noto Serif SC',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--bbg);color:var(--bink);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{margin:0;font-weight:700;line-height:1.3}
p{margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
.hide{display:none!important}
.mono{font-family:var(--mono)}
.num{font-variant-numeric:tabular-nums}
#honest{background:#101720;color:#8fa0b3;font-size:11px;padding:6px 12px;text-align:center;border-bottom:1px solid var(--bline)}
#honest b{color:#cdd9e4}
#app{max-width:760px;margin:0 auto;padding:14px 14px 100px}
.b-card{background:var(--bpanel);border:1px solid var(--bline);border-radius:14px;padding:15px;margin-top:12px;box-shadow:var(--bshadow)}
.b-card h3{font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.b-card .desc{color:var(--bink2);font-size:13px;margin-top:5px;line-height:1.6}
.b-kicker{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--bink3);font-weight:700}
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(16,20,25,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--bline);display:flex;max-width:760px;margin:0 auto}
#tabbar button{flex:1;padding:9px 2px 10px;font-size:10.5px;color:var(--bink3);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600}
#tabbar button .ic{font-size:19px}
#tabbar button.on{color:var(--brand2)}
.bbtn{background:var(--brand);color:#06251d;border-radius:10px;padding:10px 15px;font-size:13.5px;font-weight:700;transition:filter .15s,transform .05s}
.bbtn:active{transform:scale(.97)}
.bbtn.sec{background:var(--bpanel2);color:var(--bink);border:1px solid var(--bline)}
.bbtn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
.bbtn.danger{background:var(--bbad);color:#fff}
.bbtn:disabled{opacity:.45;cursor:not-allowed}
.bpill{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:700;vertical-align:middle}
.bpill.mock{background:#374151;color:#9ca3af}
.bpill.ok{background:#14532d;color:#86efac}
.bpill.warn{background:#78350f;color:#fcd34d}
.bpill.bad{background:#7f1d1d;color:#fca5a5}
.bpill.info{background:#0e3f34;color:#7fd7c0}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:9px;margin-top:11px}
.metric{background:var(--bpanel2);border:1px solid var(--bline);border-radius:11px;padding:10px 11px}
.metric b{font-size:21px;font-family:var(--mono)}
.metric span{display:block;font-size:11px;color:var(--bink2);margin-top:2px;line-height:1.35}
.mock-wm{font-size:10.5px;color:var(--bink3);margin-top:8px;line-height:1.6}
.stu-row{display:flex;align-items:center;gap:10px;padding:10px 2px;border-top:1px solid var(--bline);font-size:13px;flex-wrap:wrap}
.stu-row:first-child{border-top:none}
.stu-row .nm{font-weight:700;min-width:64px}
.stu-row .st{color:var(--bink2);font-size:12px;flex:1;line-height:1.5;min-width:150px}
.script-card{background:var(--bpanel2);border:1px dashed var(--bline);border-radius:11px;padding:13px;margin-top:10px;font-size:13.5px;line-height:1.7;color:var(--bink)}
.redline-edu{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.redline-edu span{color:#fca5a5;font-size:12.5px;font-weight:700}
.dial-row{margin-top:12px}
.dial-row .lab{display:flex;justify-content:space-between;font-size:12.5px;color:var(--bink2);font-weight:600}
.dial-row input[type=range]{width:100%;accent-color:var(--brand)}
.dial-row .lab b.over{color:var(--bbad)}
.gray-card{background:var(--bpanel2);border:1px dashed var(--bline);border-radius:11px;padding:11px 13px;margin-top:9px;
  color:var(--bink3);font-size:12.5px;display:flex;gap:8px;align-items:center}
.gray-card .gtag{font-size:9.5px;background:#374151;color:#9ca3af;padding:2px 6px;border-radius:5px;font-weight:700;flex:0 0 auto}
.svgic{stroke:var(--bink2);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle;flex:0 0 auto}
.svgic .f{fill:rgba(99,194,171,.15);stroke:none}
.svgic .fg{fill:var(--brand2);stroke:none}
.svgic.g{stroke:var(--brand2)}
.svgic.bad{stroke:var(--bbad)}
.svgic.warn{stroke:var(--bwarn)}
.svgic.dim{stroke:var(--bink3)}
.blocked-b .svgic,.pass-b .svgic,.redline-edu .svgic{vertical-align:-3px;margin-right:3px}
.attack-card{border:1px solid var(--bline);border-radius:13px;background:var(--bpanel);padding:14px;margin-top:11px}
.attack-card h4{font-size:14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.attack-card .sc{font-size:12px;color:var(--bink2);margin-top:5px;line-height:1.55}
.attack-card .why{font-size:11.5px;color:var(--bink3);margin-top:8px;border-top:1px dashed var(--bline);padding-top:7px;line-height:1.5}
.attack-card .zone{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.attack-card input[type=text]{flex:1;min-width:150px;background:var(--bpanel2);border:1px solid var(--bline);border-radius:9px;padding:9px 11px;color:var(--bink)}
.blocked-b{border:1px solid var(--bbad);background:rgba(239,68,68,.09);color:#fca5a5;border-radius:10px;padding:9px 12px;font-size:12.5px;line-height:1.55;margin-top:9px}
.pass-b{border:1px solid var(--bgood);background:rgba(34,197,94,.09);color:#86efac;border-radius:10px;padding:9px 12px;font-size:12.5px;line-height:1.55;margin-top:9px}
.gauge{display:flex;align-items:center;gap:13px;margin-top:11px}
.gauge .ring{flex:0 0 68px;height:68px;border-radius:50%;display:grid;place-items:center;
  background:conic-gradient(var(--bgood) calc(var(--p)*1%),var(--bpanel2) 0);position:relative}
.gauge .ring::after{content:"";position:absolute;inset:7px;border-radius:50%;background:var(--bpanel)}
.gauge .ring b{position:relative;z-index:1;font-family:var(--mono);font-size:15px}
.gauge .gt{font-size:12.5px;color:var(--bink2);line-height:1.55}
table.evt{width:100%;border-collapse:collapse;font-size:11.5px;margin-top:9px}
table.evt th,table.evt td{border:1px solid var(--bline);padding:5px 7px;text-align:left;color:var(--bink2)}
table.evt th{color:var(--bink);background:var(--bpanel2);font-size:11px}
details.fold{margin-top:12px;border:1px solid var(--bline);border-radius:12px;background:var(--bpanel);overflow:hidden}
details.fold summary{padding:12px 14px;font-size:13.5px;font-weight:700;cursor:pointer;list-style:none}
details.fold summary::before{content:"▸ "}
details.fold[open] summary::before{content:"▾ "}
details.fold .fbody{padding:0 14px 13px}
.segtog{display:inline-flex;background:var(--bpanel2);border-radius:9px;padding:2px;gap:2px}
.segtog button{padding:5px 11px;border-radius:7px;font-size:12px;color:var(--bink3);font-weight:600}
.segtog button.on{background:var(--brand);color:#06251d}
.field{margin-top:10px}
.field label{font-size:12.5px;color:var(--bink2);font-weight:600;display:block;margin-bottom:5px}
.field input[type=text],.field select,.field textarea{width:100%;background:var(--bpanel2);border:1px solid var(--bline);
  border-radius:9px;padding:9px 11px;color:var(--bink)}
.field textarea{min-height:88px;font-family:var(--mono);font-size:11px;word-break:break-all}
.camp-row{border:1px solid var(--bline);border-radius:11px;padding:12px;margin-top:10px;background:var(--bpanel2)}
.camp-row.cur{border-color:var(--brand)}
.camp-row .lk{font-family:var(--mono);font-size:10.5px;color:var(--bink3);word-break:break-all;margin-top:6px}
.foot-note{font-size:11px;color:var(--bink3);line-height:1.55;text-align:center;margin:26px 4px 0;
  padding-top:12px;border-top:1px dashed var(--bline)}
#modal-root{position:fixed;inset:0;z-index:80;display:none}
#modal-root.show{display:block}
#modal-root .dim{position:absolute;inset:0;background:rgba(0,0,0,.6)}
#modal-root .box{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:760px;
  background:var(--bpanel);color:var(--bink);border:1px solid var(--bline);border-radius:20px 20px 0 0;
  padding:20px 18px 26px;max-height:82vh;overflow:auto}
#toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:90;background:#0c1116;color:#dfe8ef;
  border:1px solid var(--bline);padding:9px 16px;border-radius:999px;font-size:12.5px;opacity:0;pointer-events:none;transition:opacity .2s;max-width:86vw;text-align:center}
#toast.show{opacity:1}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="honest">习惯陪伴员工作台 · 内测 pilot 版 · 学员数据来自其<b>主动发来的行为记录码</b>，非实时</div>
<script>/* 顶栏口径随模式切换（apiDetect 后由 render 调用） */
function honestBar(){ const el=document.getElementById('honest'); if(!el)return;
  el.innerHTML=(typeof API!=='undefined'&&API.on&&S.srvToken)
    ?'习惯陪伴员工作台 · 云端版 · 学员数据来自其<b>授权后的自动同步</b>，可随时撤回'
    :'习惯陪伴员工作台 · 内测 pilot 版 · 学员数据来自其<b>主动发来的行为记录码</b>，非实时'; }
</script>
<main id="app"></main>
<nav id="tabbar"></nav>
<div id="modal-root"><div class="dim" onclick="closeModal()"></div><div class="box" id="modal-box"></div></div>
<div id="toast"></div>

<script>
'use strict';
/* ============================================================
   习惯陪伴员工作台（从业者端）· 无后端 1.x
   数据入口只有一个：学员主动发来的「行为记录码」（白名单严校验）
============================================================ */
const ROLE_NAME='习惯陪伴员';
const WATERMARK='仅代表打卡行为记录，不代表健康改善、疾病风险下降或任何疗效';
const OPTIN_TEXT='我愿意营主联系我做服务提醒，不代表同意销售推荐。';
const CARE_SCRIPT='这两天是不是忙？今天回来就算继续。';
const COLD_SCRIPT='咱这营只夸坚持，不聊调理身体的事哈，身体不舒服还是得看医生～';
const THERAPY_RE=/治好|降了|排毒|便秘好了|血压|血糖|调理|瘦了/;
const NAMING_BLOCKLIST=['健康顾问','智能分诊','对症营','对症调理','最弱维度','代谢弱','毕业证','名额有限','铁证','硬证据'];
const THEMES={water:{emoji:'💧',name:'喝水营',full:true},sleep:{emoji:'🌙',name:'早睡营',full:false},sun:{emoji:'☀️',name:'晒太阳营',full:false}};
const CAPTIONS=[
 '我在参加 21 天喝水营，一起来打卡呀，互相监督更容易坚持～',
 '每天就喝一杯水、点一下，你也来陪我一段？',
 '拉你不是有什么好处，纯粹想有个人陪我打卡。',
 '给爸妈也发了一个，一家人一起养个小习惯挺好的。',
];
const EVENT_DICT=[
 ['camp_create','建营'],['import_ok','导入行为记录码成功'],['import_reject','导入被白名单拒收'],
 ['student_delete','删除学员（撤回处理）'],['optin_grant','学员同意服务提醒'],['optin_deny','学员拒绝（锁 7 天）'],
 ['outreach_log','触达留痕（原因/渠道/话术/是否被拒）'],['care_open','打开掉队关怀话术'],['csv_export','导出事件流水'],
];
/* 记录码白名单：多一个键、错一个类型，整码拒收 */
const CODE_KEYS=['v','campId','mid','nick','days','streak','updatedAt'];
function validatePublicText(v){ return !(THERAPY_RE.test(v||'')||NAMING_BLOCKLIST.some(w=>(v||'').includes(w))); }

const LS_KEY='lifestyle_b_v1';
const DEFAULT_STATE={
  btab:'camps', coach:'', activeCamp:null, boardView:'work',
  srvToken:'', srvUser:'', pendingDel:[],
  camps:[], students:[], outreach:[], tombstones:[],
  risk:{reject:5,quit:5,complain:1,revoke:2}, riskLock:false, riskLockBy:'',
  events:[],
};
function deepMerge(def,sav){
  if(Array.isArray(def)) return Array.isArray(sav)?sav:structuredClone(def);
  if(def&&typeof def==='object'){
    const o={};
    for(const k of Object.keys(def)) o[k]=(sav&&typeof sav==='object'&&!Array.isArray(sav)&&k in sav)?deepMerge(def[k],sav[k]):structuredClone(def[k]);
    if(sav&&typeof sav==='object'&&!Array.isArray(sav)) for(const k of Object.keys(sav)) if(!(k in o)) o[k]=sav[k];
    return o;
  }
  return sav===undefined?structuredClone(def):sav;
}
let S=load();
function load(){
  let st;
  try{const raw=localStorage.getItem(LS_KEY); st=raw?deepMerge(DEFAULT_STATE,JSON.parse(raw)):structuredClone(DEFAULT_STATE);}
  catch(e){ st=structuredClone(DEFAULT_STATE); }
  st.camps=(Array.isArray(st.camps)?st.camps:[]).filter(c=>c&&typeof c==='object'&&typeof c.id==='string');
  st.students=(Array.isArray(st.students)?st.students:[]).filter(x=>x&&typeof x==='object'&&typeof x.campId==='string'&&Array.isArray(x.days));
  st.tombstones=(Array.isArray(st.tombstones)?st.tombstones:[]).filter(t=>typeof t==='string');
  st.pendingDel=(Array.isArray(st.pendingDel)?st.pendingDel:[]).filter(x=>x&&typeof x.campId==='string'&&typeof x.mid==='string');
  return st;
}
function save(){ try{localStorage.setItem(LS_KEY,JSON.stringify(S));}catch(e){} }
function track(ev,data){ S.events.push({t:new Date().toISOString(),ev,data:data||null}); save(); }

const $=s=>document.querySelector(s);
let toastTimer=null;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}
function openModal(html){$('#modal-box').innerHTML=html;$('#modal-root').classList.add('show');}
function closeModal(){$('#modal-root').classList.remove('show');}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ==================== 青釉·柔线 图标库（深色端） ==================== */
const ICON_P={
 water:'<path class="f" d="M12 3.2C12 3.2 6.2 10.5 6.2 15.2A5.8 5.8 0 0 0 17.8 15.2C17.8 10.5 12 3.2 12 3.2Z"/><path d="M12 3.2C12 3.2 6.2 10.5 6.2 15.2A5.8 5.8 0 0 0 17.8 15.2C17.8 10.5 12 3.2 12 3.2Z"/>',
 sleep:'<path class="f" d="M14.4 4.2A8 8 0 1 0 19.6 15.4A6.4 6.4 0 0 1 14.4 4.2Z"/><path d="M14.4 4.2A8 8 0 1 0 19.6 15.4A6.4 6.4 0 0 1 14.4 4.2Z"/>',
 sun:'<circle class="f" cx="12" cy="12" r="4.2"/><circle cx="12" cy="12" r="4.2"/><path d="M12 3.6V5.6M12 18.4V20.4M4.6 12H6.6M17.4 12H19.4M6.7 6.7L8.1 8.1M15.9 15.9L17.3 17.3M17.3 6.7L15.9 8.1M8.1 15.9L6.7 17.3"/>',
 camp:'<path class="f" d="M12 4.5L20 18H4Z"/><path d="M12 4.5L20 18H4Z"/><path class="fg" d="M12 8.5L15 18H9Z"/><path d="M3 18H21"/>',
 board:'<rect x="4" y="5" width="16" height="14" rx="2.5"/><path d="M8 16V12M12 16V9M16 16V13" stroke-width="2"/><path class="fg" d="M12 9V16" stroke-width="0" fill="none"/>',
 material:'<rect x="7.5" y="4.5" width="10.5" height="11" rx="1.5"/><rect class="f" x="6" y="8" width="10.5" height="11" rx="1.5"/><rect x="6" y="8" width="10.5" height="11" rx="1.5"/><path d="M8.5 12H14M8.5 15H12.5"/>',
 guard:'<path class="f" d="M12 3.5L19 6V12C19 16.5 15.5 19.5 12 20.8C8.5 19.5 5 16.5 5 12V6Z"/><path d="M12 3.5L19 6V12C19 16.5 15.5 19.5 12 20.8C8.5 19.5 5 16.5 5 12V6Z"/><path class="fg" d="M9 11.8L11.2 14L15 9.8" stroke="none"/>',
 lock:'<rect class="f" x="6" y="11" width="12" height="9" rx="3"/><rect x="6" y="11" width="12" height="9" rx="3"/><path d="M8.6 11V9A3.4 3.4 0 0 1 15.4 9V11"/><circle class="fg" cx="12" cy="14.6" r="1.1"/>',
 ban:'<circle cx="12" cy="12" r="8"/><path d="M6.5 6.5L17.5 17.5"/>',
 x:'<path d="M7 7L17 17M17 7L7 17"/>',
 bookmark:'<path class="f" d="M7 4H17V20L12 16L7 20Z"/><path d="M7 4H17V20L12 16L7 20Z"/>',
 flask:'<path class="f" d="M10 4V9L5.6 17A1.5 1.5 0 0 0 7 19.2H17A1.5 1.5 0 0 0 18.4 17L14 9V4Z"/><path d="M10 4V9L5.6 17A1.5 1.5 0 0 0 7 19.2H17A1.5 1.5 0 0 0 18.4 17L14 9V4Z"/><path d="M9 4H15M8.4 13.5H15.6"/>',
 warn:'<path d="M12 4.5L20.5 19H3.5Z"/><path d="M12 10V14"/><circle class="fg" cx="12" cy="16.4" r="0.9"/>'
};
function ICN(n,cls,sz){sz=sz||24;return '<svg class="svgic '+(cls||'')+'" width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24">'+(ICON_P[n]||'')+'</svg>';}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function cAppUrl(){ return new URL('../c/',location.href).href; }

/* ==================== 云端（2.0 · 账号与服务端验真看板） ==================== */
const API={on:false};
const SRV={me:null};
async function apiPost(path,data,useAuth){
  const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json',...(useAuth&&S.srvToken?{Authorization:'Bearer '+S.srvToken}:{})},body:JSON.stringify(data)});
  return r.json();
}
async function apiGet(path){ const r=await fetch(path,{headers:S.srvToken?{Authorization:'Bearer '+S.srvToken}:{},cache:'no-store'}); return r.json(); }
async function apiDel(path){ const r=await fetch(path,{method:'DELETE',headers:S.srvToken?{Authorization:'Bearer '+S.srvToken}:{}}); return r.json(); }
async function apiDetect(){
  if(location.protocol==='file:') return;
  try{ const r=await apiGet('/api/health'); if(r&&r.ok){ API.on=true; if(S.srvToken) await srvRefresh(); render(); } }catch(e){}
}
async function srvRefresh(){
  if(!(API.on&&S.srvToken)) return false;
  try{
    /* 0) 未确认的云删除先补投：撤回处理必达，绝不让删除被看板刷新静默撤销 */
    for(const pd of [...S.pendingDel]){
      try{
        const r=await apiDel('/api/b/camps/'+encodeURIComponent(pd.campId)+'/members/'+encodeURIComponent(pd.mid));
        if(r&&(r.ok||r.error==='没有这位学员')) S.pendingDel=S.pendingDel.filter(x=>!(x.campId===pd.campId&&x.mid===pd.mid));
      }catch(e){ /* 下轮再投 */ }
    }
    const me=await apiGet('/api/b/me');
    if(!me||!me.ok){ if(me&&me.code===401){ S.srvToken=''; S.srvUser=''; save(); toast('登录已过期，请重新登录'); } return false; }
    SRV.me=me;
    if(me.name&&!S.coach) S.coach=me.name;
    /* 云营并入本地列表（invite token 以服务端为准） */
    me.camps.forEach(sc=>{
      let c=S.camps.find(x=>x.id===sc.id);
      if(!c){ S.camps.push({id:sc.id,theme:sc.theme,name:sc.name,token:sc.inviteToken,createdAt:sc.createdAt,srv:true}); }
      else { c.srv=true; c.token=sc.inviteToken; c.name=sc.name; }
    });
    if(!S.activeCamp&&S.camps.length) S.activeCamp=S.camps[0].id;
    /* 刷全部云营（不只当前营）：撤回抹除对每个营即时生效，不留滞留数据 */
    for(const camp of S.camps.filter(c=>c.srv&&me.camps.some(sc=>sc.id===c.id))){
      const b=await apiGet('/api/b/camps/'+encodeURIComponent(camp.id)+'/board');
      if(!(b&&b.ok)) continue;
      b.students.forEach(sv=>{
        if(S.pendingDel.some(x=>x.campId===camp.id&&x.mid===sv.mid)) return;   /* 删除在途：不物化回来 */
        if(!sv.optin&&S.tombstones.includes(camp.id+'|'+sv.mid)) return;        /* 本地已墓碑且服务端未确认其重新同意：不复活 */
        let stu=S.students.find(x=>x.campId===camp.id&&x.mid===sv.mid);
        if(!stu){ stu={id:newId('s'),campId:camp.id,mid:sv.mid,nick:'',days:[],streak:0,updatedAt:sv.joinDate,importedAt:todayStr(),optin:false,rejectedUntil:0}; S.students.push(stu); }
        const nk=(sv.nick||'').trim();
        if(nk&&validatePublicText(nk)) stu.nick=nk; else if(!stu.nick) stu.nick='学员'+sv.mid.slice(0,4);
        stu.joinDate=sv.joinDate;
        if(sv.ended){ stu.days=[]; stu.streak=0; stu.srvDays=false; stu.verified=true; stu.noBehavior=true; stu.ended=true; stu.updatedAt=sv.joinDate; }
        else if(sv.optin){
          stu.verified=true; stu.noBehavior=false; stu.srvDays=true; stu.ended=false;
          stu.days=(sv.days||[]).filter(d=>Number.isInteger(d)&&d>=1&&d<=21);
          stu.streak=Math.max(0,Math.min(21,sv.streak|0));
          stu.updatedAt=/^\d{4}-\d{2}-\d{2}$/.test(sv.updatedAt||'')?sv.updatedAt:sv.joinDate;
          S.tombstones=S.tombstones.filter(t=>t!==camp.id+'|'+sv.mid);   /* 服务端已确认其重新同意 */
        }else if(!stu.srvDays&&stu.days&&stu.days.length){
          stu.verified=false; stu.noBehavior=false;            /* 手动记录码在：按自报口径显示 */
        }else{
          /* 撤回 = 即时抹除：云同步来的行为数据不得在本机留存 */
          stu.days=[]; stu.streak=0; stu.srvDays=false;
          stu.verified=true; stu.noBehavior=true; stu.updatedAt=sv.joinDate;
        }
      });
      /* retired（退营 user_left / 被删 tombstone）：加本地墓碑挡旧码重导入，并移除对应本机行（含离线自报快照） */
      const retired=Array.isArray(b.retired)?b.retired:[];
      retired.forEach(mid=>{ const k=camp.id+'|'+mid; if(!S.tombstones.includes(k)) S.tombstones.push(k); });
      S.students=S.students.filter(st=>{
        if(st.campId!==camp.id) return true;
        if(retired.includes(st.mid)) return false;            /* 服务端已退营/删除 → 本机一律移除 */
        if(!st.verified) return true;                          /* 纯离线自报学员（服务端不认识）保留 */
        return b.students.some(sv=>sv.mid===st.mid);
      });
    }
    save();
    return true;
  }catch(e){ return false; }
}

/* ============ 导入行为记录码（白名单严校验） ============ */
function decodeAuthCode(raw){
  raw=(raw||'').trim();
  if(raw.length>4000) return {ok:false,reason:'码过长，已拒收'};
  if(!raw.startsWith('XSJ1.')) return {ok:false,reason:'不是行为记录码（应以 XSJ1. 开头）'};
  let json;
  try{
    const b64=raw.slice(5).replace(/-/g,'+').replace(/_/g,'/');
    json=JSON.parse(decodeURIComponent(escape(atob(b64))));
  }catch(e){ return {ok:false,reason:'码已损坏，无法解析'}; }
  if(typeof json!=='object'||json===null||Array.isArray(json)) return {ok:false,reason:'码结构非法'};
  const keys=Object.keys(json);
  const extra=keys.filter(k=>!CODE_KEYS.includes(k));
  if(extra.length) return {ok:false,reason:'白名单拒收：码里出现了不该存在的字段 '+extra.join('、')};
  const missing=CODE_KEYS.filter(k=>!keys.includes(k));
  if(missing.length) return {ok:false,reason:'缺少字段：'+missing.join('、')};
  if(json.v!==1) return {ok:false,reason:'版本不支持'};
  if(typeof json.campId!=='string'||json.campId.length>32) return {ok:false,reason:'campId 非法'};
  if(typeof json.mid!=='string'||!/^[a-z0-9]{4,16}$/.test(json.mid)) return {ok:false,reason:'成员编号非法'};
  if(typeof json.nick!=='string'||json.nick.length>12) return {ok:false,reason:'称呼非法'};
  if(!Array.isArray(json.days)||json.days.length>21||json.days.some(d=>!Number.isInteger(d)||d<1||d>21)) return {ok:false,reason:'打卡日期非法'};
  if(!Number.isInteger(json.streak)||json.streak<0||json.streak>21) return {ok:false,reason:'连续天数非法'};
  if(!/^\d{4}-\d{2}-\d{2}$/.test(json.updatedAt)) return {ok:false,reason:'更新日期非法'};
  return {ok:true,data:{v:1,campId:json.campId,mid:json.mid,nick:json.nick,days:[...new Set(json.days)].sort((a,b)=>a-b),streak:json.streak,updatedAt:json.updatedAt}};
}
function importCode(){
  const raw=$('#codein').value;
  const res=decodeAuthCode(raw);
  if(!res.ok){ track('import_reject',{reason:res.reason}); $('#importmsg').innerHTML=`<div class="blocked-b">${ICN('ban','bad',15)}${esc(res.reason)}</div>`; return; }
  const d=res.data;
  let camp=S.camps.find(c=>c.id===d.campId);
  if(!camp){
    $('#importmsg').innerHTML=`<div class="blocked-b">这个码属于营 <span class="mono">${esc(d.campId)}</span>，你这里没有这个营。请先在「营」页确认。</div>`;
    return;
  }
  let nick=(d.nick||'').trim()||('学员'+d.mid.slice(0,4));
  let sanitized=false;
  if(!validatePublicText(nick)){ nick='学员'+d.mid.slice(0,4); sanitized=true; }   /* 昵称词表消毒：疗效词/禁词不入看板与播报 */
  const tkey=d.campId+'|'+d.mid;
  if(S.tombstones.includes(tkey)){

    }
    S.tombstones=S.tombstones.filter(t=>t!==tkey); track('tombstone_clear',{campId:d.campId,mid:d.mid});
  }
  let stu=S.students.find(x=>x.campId===d.campId&&x.mid===d.mid);
  if(stu){
    if(stu.updatedAt>d.updatedAt){ track('import_reject',{reason:'stale'}); $('#importmsg').innerHTML=`<div class="blocked-b">${ICN('ban','bad',15)}这枚码（${esc(d.updatedAt)}）比已有记录（${esc(stu.updatedAt)}）旧，已拒收。</div>`; return; }
    stu.days=d.days; stu.streak=d.streak; stu.updatedAt=d.updatedAt; stu.importedAt=todayStr(); stu.nick=nick;
  }else{
    stu={id:newId('s'),campId:d.campId,mid:d.mid,nick,days:d.days,streak:d.streak,updatedAt:d.updatedAt,importedAt:todayStr(),optin:false,rejectedUntil:0};
    S.students.push(stu);
  }
  save(); track('import_ok',{campId:d.campId,mid:d.mid,days:d.days.length});
  $('#codein').value='';
  $('#importmsg').innerHTML=`<div class="pass-b">✓ 已更新「${esc(nick)}」：打卡 ${d.days.length} 天 · 连续 ${d.streak} 天 · 截至 ${esc(d.updatedAt)}${sanitized?'（原称呼含不可对外的词，已替换）':''}</div>`;
  setTimeout(render,900);
}

const RISK_TH={reject:30,quit:25,complain:5,revoke:10};
function riskSet(k,v){
  S.risk[k]=+v;
  const over=Object.entries(RISK_TH).filter(([kk,tt])=>(S.risk[kk]??0)>tt);
  S.riskLock=over.length>0;
  S.riskLockBy=over.map(([kk])=>({reject:'拒绝率',quit:'退营率',complain:'投诉率',revoke:'撤回授权率'}[kk])).join('、');
  save(); render();
}
function stuById(id){ return S.students.find(x=>x.id===id); }
function canOutreach(s){ return !S.riskLock && !(s&&s.rejectedUntil>Date.now()); }
function deleteStudent(id){
  const s=stuById(id); if(!s)return;
  if(!confirm(`删除「${s.nick}」？她的行为记录将移除、称呼在历史留痕中匿名化；再次导入需其重新授权。`))return;
  S.students=S.students.filter(x=>x.id!==id);
  S.tombstones.push(s.campId+'|'+s.mid);                                  /* 墓碑：旧码不可直接复活 */
  if(s.verified&&API.on&&S.srvToken){
    S.pendingDel.push({campId:s.campId,mid:s.mid}); save();       /* 必达队列：确认前不物化回看板，刷新时自动补投 */
    apiDel('/api/b/camps/'+encodeURIComponent(s.campId)+'/members/'+encodeURIComponent(s.mid))
      .then(r=>{ if(r&&(r.ok||r.error==='没有这位学员')){ S.pendingDel=S.pendingDel.filter(x=>!(x.campId===s.campId&&x.mid===s.mid)); save(); }
                 else toast('云端删除暂未确认，将自动重试'); })
      .catch(()=>toast('云端删除暂未确认，将自动重试'));
  }
  S.outreach.forEach(r=>{ if(r.mid===s.mid) r.who='（已删除学员）'; });     /* 审计匿名化 */
  S.events.forEach(e=>{ if(e.data&&e.data.mid===s.mid&&e.data.who) e.data.who='（已删除学员）'; });
  save(); track('student_delete',{campId:s.campId,mid:s.mid}); toast('已删除并留痕（历史称呼已匿名化）'); render();
}
function careModal(id){
  const s=stuById(id); if(!s)return;
  if(!canOutreach(s)){ toast(S.riskLock?'触达模块已被风险锁关闭':'该学员拒绝后处于 7 天锁定期'); return; }
  track('care_open',{campId:s.campId,mid:s.mid});
  openModal(`<h3 style="font-size:17px">掉队关怀 · ${esc(s.nick)}</h3>
    <p class="desc" style="margin-top:8px">只给白名单话术，没有群内点名功能。</p>

function optinModal(id){
  const s=stuById(id); if(!s)return;
  openModal(`<h3 style="font-size:17px">发起提醒授权 · ${esc(s.nick)}</h3>

      <button class="bbtn sm" onclick="optinAnswer('${esc(id)}',true)">她同意了</button>

function optinAnswer(id,yes){
  const s=stuById(id); if(!s)return;
  if(yes){ s.optin=true; track('optin_grant',{campId:s.campId,mid:s.mid,consentVersion:1}); }
  else{ s.optin=false; s.rejectedUntil=Date.now()+7*86400000; track('optin_deny',{campId:s.campId,mid:s.mid,consentVersion:1}); }
  save(); closeModal();
  toast(yes?'已记录：同意服务提醒':'已记录：拒绝。7 天内按钮锁死。'); render();
}
function outreachModal(id,preset){
  const s=stuById(id); if(!s)return;
  if(!canOutreach(s)){ toast(S.riskLock?'触达模块已被风险锁关闭':'该学员拒绝后处于 7 天锁定期'); return; }
  openModal(`<h3 style="font-size:17px">记录本次触达 · ${esc(s.nick)}</h3>
    <div class="field"><label>触达原因</label><select id="o_reason">
      <option ${preset==='掉队关怀'?'selected':''}>掉队关怀</option><option>用户主动请求</option></select></div>
    <div class="field"><label>渠道</label><select id="o_channel"><option>微信私聊</option><option>群内</option></select></div>
    <div class="field"><label>话术版本</label><select id="o_script">
      <option>白名单 A：回来就算继续</option><option>白名单 B：搭档接住</option></select></div>
    <div class="field"><label>是否被拒</label><select id="o_rej"><option value="0">否</option><option value="1">是</option></select></div>
    <button class="bbtn" style="margin-top:14px" onclick="outreachSave('${esc(id)}')">写入事件流水</button>`);
}
function outreachSave(id){
  const s=stuById(id); if(!s)return;
  if(!canOutreach(s)){ closeModal(); toast('已被锁定，本次触达未记录——也不应发生'); return; }
  const rejected=$('#o_rej').value==='1';
  const rec={t:new Date().toISOString(),who:s.nick,mid:s.mid,campId:s.campId,reason:$('#o_reason').value,channel:$('#o_channel').value,script:$('#o_script').value,rejected};
  S.outreach.push(rec);
  if(rejected){ s.optin=false; s.rejectedUntil=Date.now()+7*86400000; }   /* 被拒即锁 7 天并撤销 opt-in */
  save(); track('outreach_log',rec); closeModal(); toast(rejected?'已留痕。对方拒绝：7 天内不可再触达。':'已留痕'); render();
}
function exportCSV(){
  const rows=[['time','event','data']];
  S.events.forEach(e=>rows.push([e.t,e.ev,e.data?JSON.stringify(e.data).replace(/"/g,'""'):'']));
  const csv='﻿'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  const a=document.createElement('a');a.href=url;a.download='b_events.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
  track('csv_export',{n:S.events.length}); toast('已导出（不含任何学员感受内容——本端从未收到过）');
}

    ${footNote()}`;
}
function atk1(){
  const v=$('#atk1').value||'';
  if(NAMING_BLOCKLIST.some(w=>v.includes(w))||/对症|调理|治|症/.test(v))
    guardPass('g1',`<div class="blocked-b">${ICN('ban','bad',15)}营名被拦截：命中命名禁词。请落在「习惯」上，比如「21 天喝水营」。</div>`);
  else $('#atk1r').innerHTML=`<div class="pass-b">这个名字没问题。试试「一键填入」再提交。</div>`;
}
function atk2(){
  const payload={v:1,campId:'camp-x',nick:'张姐',days:[1,2,3],streak:3,updatedAt:todayStr(),score:55,feel:'很棒'};
  const code='XSJ1.'+btoa(unescape(encodeURIComponent(JSON.stringify(payload)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const res=decodeAuthCode(code);
  if(res.ok) guardFail('g2','解析器接受了带 score/feel 的超集码');
  else guardPass('g2',`<div class="blocked-b">${ICN('ban','bad',15)}${esc(res.reason)}<br>白名单：<span class="mono">${CODE_KEYS.join(' / ')}</span>——多一个键，整码拒收。</div>`);
}
function atk3(){
  const v=$('#atk3').value||'';
  if(THERAPY_RE.test(v)) guardPass('g3',`<div class="blocked-b">${ICN('ban','bad',15)}${COLD_SCRIPT}<br>这句话不会进入任何对外物料。</div>`);
  else $('#atk3r').innerHTML=`<div class="pass-b">这句没有疗效词。试试「一键填入」。</div>`;
}
function atk4(){
  const camp=activeCampObj()||{id:'camp-demo',token:'t0',theme:'water',name:'21 天喝水营'};
  const u=new URL(campLink(camp));
  const keys=[...u.searchParams.keys()];
  const bad=keys.filter(k=>!['campId','inviteToken'].includes(k));
  if(bad.length) guardFail('g4','链接里出现了 '+bad.join('、'));
  else guardPass('g4',`<div class="blocked-b">${ICN('ban','bad',15)}真实链接参数：<span class="mono">${esc(keys.join('、'))}</span>——没有 pid / shareUserId / refSalesId 的容身处。</div>`);
}

/* ============ 渲染 ============ */
function footNote(){ return `<p class="foot-note">本工具只做生活习惯记录与陪伴，不是健康评估、诊断或疗效承诺。身体不适请就医。</p>`; }
let lastBoardFetch={};
function render(){
  const bar=$('#tabbar');
  bar.innerHTML=[['camps','camp','营'],['board','board','看板'],['mat','material','物料'],['guard','guard','围栏']]
    .map(([k,ik,lab])=>`<button class="${S.btab===k?'on':''}" onclick="S.btab='${k}';save();render()">${ICN(ik,S.btab===k?'g':'dim',22)}${lab}</button>`).join('');
  ({camps:renderCamps,board:renderBoard,mat:renderMat,guard:renderGuard})[S.btab]();
  honestBar();
  scheduleScan();
  const _ac=activeCampObj();
  if(S.btab==='board'&&API.on&&S.srvToken&&_ac&&_ac.srv&&Date.now()-(lastBoardFetch[_ac.id]||0)>8000){
    lastBoardFetch[_ac.id]=Date.now(); srvRefresh().then(()=>render());
  }
}
/* 命名禁词 DOM 扫描（.redline-edu 禁语教育区豁免） */
function scanNaming(){
  const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);
  const hits=[];
  while(walker.nextNode()){
    const n=walker.currentNode;
    if(n.parentElement&&n.parentElement.closest('.redline-edu,script'))continue;
    NAMING_BLOCKLIST.forEach(w=>{if(n.textContent.includes(w))hits.push(w);});
  }
  if(hits.length) console.error('[围栏] 命名禁词命中：',hits);
  return hits.length;
}
let scanTimer=null;
function scheduleScan(){ clearTimeout(scanTimer); scanTimer=setTimeout(scanNaming,250); }
render();
apiDetect();
/* 看板定时对账：即使营主盯着不操作，退营/撤回/删除也在 ~20s 内从看板消失（拉模型的静止刷新） */
setInterval(()=>{ const ac=activeCampObj(); if(S.btab==='board'&&API.on&&S.srvToken&&ac&&ac.srv){ lastBoardFetch[ac.id]=Date.now(); srvRefresh().then(ok=>{ if(ok) render(); }); } },20000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden&&S.btab==='board'&&API.on&&S.srvToken){ srvRefresh().then(ok=>{ if(ok) render(); }); } });
</script>
</body>
