<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>生活方式自检 · 21天习惯营</title>
<style>
/* ================= tokens ================= */
:root{
  /* C端 · 素瓷·晴序（2.0 定稿：老板拍板 B 方向） */
  --paper:#f2f5f2; --paper2:#e8ece8; --card:#ffffff;
  --ink:#22332c; --ink2:#556059; --ink3:#5f6d65;   /* ink3 ≥4.5:1 于 paper/paper2/card（普通文字 WCAG AA） */
  --green:#256b5d; --green-d:#1c554a; --green-l:#8fc2b2; --green-wash:#eef4f1;
  --clay:#2e5e73; --clay-d:#24485a; --clay-wash:#e7eef2;
  --good:#2f7d5d; --warn:#9a5713; --soft:#d3dbd6;
  --line:#e3e8e4; --line2:#cfd8d2; --hairline:rgba(34,51,44,.08);
  --is:#45645b; --gw:rgba(37,107,93,.14); --gw2:rgba(37,107,93,.22);
  /* B端 · 深色工具 */
  --bbg:#0f1419; --bpanel:#1a212b; --bpanel2:#212b38; --bline:#2c3846;
  --bink:#e7edf3; --bink2:#a9b7c6; --bink3:#6b7a8d;
  --brand:#2f9d84; --brand2:#63c2ab; --bgood:#22c55e; --bwarn:#f59e0b; --bbad:#ef4444;
  --shadow:0 1px 2px rgba(34,51,44,.04),0 14px 34px rgba(34,51,44,.08);
  --shadow-sm:0 1px 2px rgba(34,51,44,.04),0 10px 28px rgba(34,51,44,.06);
  --bshadow:0 8px 30px rgba(0,0,0,.35);
  --mono:'SF Mono',ui-monospace,Menlo,Consolas,monospace;
  --serif:'Songti SC','STSong','Noto Serif SC',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',system-ui,sans-serif;
  --r:16px; --rs:12px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:16px;line-height:1.6;
  -webkit-font-smoothing:antialiased;min-height:100vh}
body[data-role="b"]{background:var(--bbg);color:var(--bink)}
h1,h2,h3,h4{margin:0;font-weight:700;line-height:1.3;text-wrap:balance}
p{margin:0}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,select,textarea{font-family:inherit;font-size:14px}
.hide{display:none!important}
.mono{font-family:var(--mono)}
.num{font-variant-numeric:tabular-nums}

/* ================= 演示控制条 ================= */
#demobar{position:sticky;top:0;z-index:60;background:#26221c;color:#cbc2b2;padding:7px 10px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;box-shadow:0 2px 10px rgba(0,0,0,.25)}
#demobar .tag{font-size:10px;font-weight:800;letter-spacing:.08em;color:#26221c;background:var(--clay);
  padding:2px 7px;border-radius:5px;flex:0 0 auto}
.segtog{display:inline-flex;background:#3a342b;border-radius:9px;padding:2px;gap:2px}
.segtog button{padding:4px 10px;border-radius:7px;font-size:12px;color:#a99f8d;font-weight:600;transition:.15s}
.segtog button.on{background:#f0e9dc;color:#26221c}
#daydial{display:inline-flex;gap:2px;background:#3a342b;border-radius:9px;padding:2px}
#daydial button{padding:4px 8px;border-radius:7px;font-size:11.5px;color:#a99f8d;font-weight:700}
#daydial button.on{background:var(--green-l);color:#0c261d}
#demobar .rst{margin-left:auto;font-size:11.5px;color:#a99f8d;text-decoration:underline;text-underline-offset:3px}

/* ================= 诚实 banner ================= */
#honest{background:#41372a;color:#d8cfbe;font-size:11.5px;line-height:1.5;padding:7px 12px;text-align:center}
#honest b{color:#fff}
body[data-role="b"] #honest{background:#101720;color:#8fa0b3;border-bottom:1px solid var(--bline)}

/* ================= C端 布局 ================= */
#view-c{max-width:520px;margin:0 auto;padding:18px 16px 110px}
.foot-note{font-size:12.5px;color:var(--ink3);line-height:1.6;text-align:center;margin:26px 4px 0;
  padding-top:12px;border-top:1px dashed var(--line2)}
.c-card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r);
  box-shadow:var(--shadow-sm);padding:18px;margin-top:14px}
.c-kicker{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:9px}
.cbtn{display:block;width:100%;background:var(--green);color:#fff;border-radius:14px;padding:14px;
  font-size:16px;font-weight:700;text-align:center;transition:transform .06s,filter .15s;box-shadow:0 6px 16px rgba(37,107,93,.22)}
.cbtn:active{transform:scale(.97)}
.cbtn.sec{background:var(--card);color:var(--green-d);border:1.5px solid var(--green);box-shadow:none}
.cbtn.ghost{background:none;color:var(--ink2);box-shadow:none;font-weight:600;font-size:14px}
.cbtn.clay{background:var(--clay);box-shadow:0 6px 16px rgba(46,94,115,.22)}
.cbtn:disabled{opacity:.45}
.lock-line{display:flex;gap:7px;align-items:flex-start;font-size:12.5px;color:var(--green-d);
  background:var(--green-wash);border-radius:10px;padding:9px 12px;line-height:1.5}
.small-note{font-size:14px;color:var(--ink3);line-height:1.6;margin-top:8px}

/* 素瓷·晴序 组件 */
.kilnmark{width:88px;height:88px;border-radius:50%;border:1px solid var(--green);display:grid;place-items:center;
  position:relative;margin:24px auto 4px}
.kilnmark::before{content:"";position:absolute;inset:5px;border:2px solid var(--green);border-radius:50%}
.kilnmark span{font-family:var(--serif);font-size:34px;color:var(--green-d);font-weight:600;position:relative}
.glaze-dot{flex:0 0 auto;display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;
  padding:3px 9px;border-radius:999px;margin-top:2px}
.glaze-dot::before{content:"";width:10px;height:10px;border-radius:50%;background:currentColor}
.glaze-dot.g{color:var(--good);background:rgba(47,125,93,.09)}
.glaze-dot.y{color:var(--warn);background:rgba(154,87,19,.09)}
.glaze-dot.o{color:#a1522d;background:rgba(161,82,45,.1)}
/* 青釉·柔线 定制图标 */
.svgic{stroke:var(--is);stroke-width:1.6;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle;flex:0 0 auto}
.svgic .f{fill:var(--gw);stroke:none}
.svgic .fg{fill:var(--green);stroke:none}
.svgic.g{stroke:var(--green)}
.svgic.wt{stroke:#fff}
.svgic.wt .f{fill:rgba(255,255,255,.28)}
.map21 .cell .cdot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.map21 .cell .cdot.ho{background:none;border:1.5px solid var(--green)}
.checkin-grid button .svgic{margin-bottom:2px}
.sticky-priv{position:sticky;z-index:45}
.badge .kchar{width:42px;height:42px;margin:0 auto;border-radius:50%;border:1px solid var(--soft);
  display:grid;place-items:center;font-family:var(--serif);font-size:15px;color:var(--ink3);position:relative}
.badge .kchar::before{content:"";position:absolute;inset:4px;border:2px solid currentColor;border-radius:50%;opacity:.45}
.badge.lit .kchar{color:var(--green-d);border-color:var(--green-l);background:var(--green-wash)}

/* 欢迎页 */
.hero-title{font-family:var(--serif);font-size:clamp(26px,7vw,34px);font-weight:600;line-height:1.2;margin-top:18px}
.hero-title em{font-style:normal;color:var(--green-d);position:relative}
.hero-title em::after{content:"";position:absolute;left:-1px;right:-1px;bottom:2px;height:9px;background:var(--green-wash);z-index:-1;border-radius:3px}
.hero-title.big{font-size:clamp(30px,9vw,42px);line-height:1.2;margin-top:6px;text-align:center;letter-spacing:.01em}
.entry-kicker{text-align:center;font-size:12.5px;color:var(--ink3);font-weight:700;letter-spacing:.05em;margin-top:6px}
.trust-line{text-align:center;font-size:12px;color:var(--ink3);margin-top:16px;line-height:1.6}
.trust-line .svgic{vertical-align:-2px;margin-right:1px}
.lead{font-family:var(--serif);font-size:clamp(21px,5.6vw,27px);font-weight:600;line-height:1.32;margin-top:16px}

/* 问卷 */
.rainbow{display:flex;gap:4px;margin-top:16px}
.rainbow .seg{flex:1;height:8px;border-radius:5px;background:var(--paper2);position:relative;overflow:hidden}
.rainbow .seg i{position:absolute;left:0;top:0;bottom:0;width:0;border-radius:5px;transition:width .3s}
.rainbow .seg.done{animation:pop .4s}
@keyframes pop{50%{transform:scaleY(1.7)}}
.rainbow-lab{display:flex;gap:4px;margin-top:4px}
.rainbow-lab span{flex:1;text-align:center;font-size:11px;opacity:.75}
.q-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap;margin-top:18px}
.q-kicker{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;font-weight:700;color:var(--green-d);
  background:var(--green-wash);padding:5px 12px;border-radius:999px}
.q-num{font-size:13px;color:var(--ink3);font-weight:700}
.q-text{font-family:var(--serif);font-size:clamp(32px,11vw,48px);font-weight:600;line-height:1.26;margin-top:14px;letter-spacing:.01em}
.q-text:focus{outline:none}
.q-text:focus-visible{outline:2px solid var(--green-l);outline-offset:4px;border-radius:6px}
.q-text .qhl{font-style:normal;color:var(--green)}
.q-opts{display:flex;flex-direction:column;gap:12px;margin-top:24px}
.q-opt{display:flex;align-items:center;gap:14px;background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:17px 18px;font-size:17px;font-weight:400;color:var(--ink);text-align:left;line-height:1.4;min-height:60px;letter-spacing:.02em;
  transition:transform .06s,border-color .15s,background .15s;box-shadow:var(--shadow-sm)}
.q-opt .rad{flex:0 0 auto;width:24px;height:24px;border-radius:50%;border:2px solid var(--ink3);transition:all .15s}
.q-opt:active{transform:scale(.98);border-color:var(--green);background:var(--green-wash)}
.q-opt:active .rad{border-color:var(--green);background:var(--green);box-shadow:inset 0 0 0 4px var(--card)}
.quiz-slide{animation:slidein .22s ease}
@keyframes slidein{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
.dim-pass{position:fixed;inset:0;z-index:70;display:grid;place-items:center;background:rgba(247,243,234,.94);animation:fadein .2s}
.dim-pass .big{font-size:64px;animation:zoomy .55s}
.dim-pass p{font-size:17px;font-weight:700;color:var(--ink2);margin-top:8px}
@keyframes zoomy{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes fadein{from{opacity:0}to{opacity:1}}

/* 报告 */
.radar-wrap{display:grid;place-items:center;margin-top:6px}
.lights{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.light-row{display:flex;gap:10px;align-items:flex-start;background:var(--card);border:1px solid var(--line);
  border-radius:12px;padding:11px 13px}
.light-row .dot{font-size:17px;flex:0 0 auto;margin-top:1px}
.light-row .t b{font-size:14px}
.light-row .t p{font-size:12.5px;color:var(--ink2);line-height:1.5;margin-top:2px}
.light-row .tip{font-size:11px;color:var(--ink3);margin-top:5px;border-top:1px dashed var(--line);padding-top:5px}
.edu-card{margin-top:10px;border:1px solid var(--line);border-radius:12px;background:var(--card);overflow:hidden}
.edu-card summary{padding:11px 13px;font-size:13.5px;font-weight:700;cursor:pointer;list-style:none;display:flex;gap:8px;align-items:center}
.edu-card summary::after{content:"＋";margin-left:auto;color:var(--ink3)}
.edu-card[open] summary::after{content:"－"}
.edu-card .body{padding:0 13px 12px;font-size:12.5px;color:var(--ink2);line-height:1.6}
.disclaim{background:var(--paper2);border-radius:10px;padding:10px 13px;font-size:11.5px;color:var(--ink2);line-height:1.55;margin-top:14px}

/* 主题匹配 */
.theme-card{background:var(--card);border:1.5px solid var(--line);border-radius:var(--r);padding:16px;margin-top:12px;
  display:flex;gap:13px;align-items:flex-start;transition:border-color .15s;cursor:pointer}
.theme-card:active{border-color:var(--green)}
.theme-card .ic{font-size:30px;flex:0 0 auto}
.theme-card h4{font-size:16.5px}
.theme-card .why{font-size:12.5px;color:var(--ink2);margin-top:4px;line-height:1.5}
.theme-card .play{font-size:12px;color:var(--green-d);font-weight:700;margin-top:7px}
.theme-card .demo-tag{font-size:10px;background:var(--paper2);color:var(--ink3);border-radius:5px;padding:1px 6px;
  font-weight:700;margin-left:6px;vertical-align:2px}

/* 入营 */
.anchor-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.anchor-grid button{border:1.5px solid var(--line2);background:var(--card);border-radius:999px;padding:8px 14px;
  font-size:13.5px;font-weight:600;color:var(--ink2)}
.anchor-grid button.on{border-color:var(--green);background:var(--green-wash);color:var(--green-d)}
.pact{font-family:var(--serif);font-size:16px;line-height:1.8;background:var(--card);border:1px dashed var(--line2);
  border-radius:var(--r);padding:16px;margin-top:12px}
.pact u{text-decoration-color:var(--green-l);text-underline-offset:4px;font-weight:700}
.switch-row{display:flex;gap:11px;align-items:flex-start;padding:12px 0;border-top:1px dashed var(--line)}
.switch-row:first-child{border-top:none}
.sw{flex:0 0 56px;height:34px;border-radius:999px;background:var(--soft);position:relative;transition:.2s;border:none;cursor:pointer}
.sw::after{content:"";position:absolute;top:3px;left:3px;width:28px;height:28px;border-radius:50%;background:#fff;
  transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.sw.on{background:var(--green)}
.sw.on::after{left:25px}
.sw:disabled{opacity:.5;cursor:not-allowed}
.switch-row .lab{font-size:13.5px;color:var(--ink2);line-height:1.6}
.switch-row .lab b{color:var(--ink);font-size:14.5px}

/* 营内 */
#ctabbar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,253,248,.95);backdrop-filter:blur(10px);
  border-top:1px solid var(--line);display:flex;max-width:520px;margin:0 auto}
#ctabbar button{flex:1;padding:9px 2px 10px;font-size:11px;color:var(--ink3);display:flex;flex-direction:column;align-items:center;gap:2px;font-weight:600}
#ctabbar button .ic{font-size:20px}
#ctabbar button.on{color:var(--green-d)}
.streak-hero{text-align:center;padding:10px 0 4px}
.streak-hero .n{font-family:var(--serif);font-size:56px;font-weight:700;color:var(--green-d);line-height:1}
.streak-hero .n.bump{animation:bump .5s}
@keyframes bump{40%{transform:scale(1.25)}}
.streak-hero .lab{font-size:12.5px;color:var(--ink2);font-weight:600;margin-top:4px}
.paper-stack{display:flex;align-items:flex-end;justify-content:center;gap:2px;height:34px;margin-top:8px}
.paper-stack i{width:26px;background:var(--green-l);border-radius:2px;opacity:.9}
.checkin-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.checkin-grid button{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 8px;
  font-size:14px;font-weight:700;display:flex;flex-direction:column;gap:4px;align-items:center;transition:transform .06s}
.checkin-grid button .ic{font-size:26px}
.checkin-grid button:active{transform:scale(.95)}
.checkin-grid button:disabled{opacity:.5}
.quote-pop{background:var(--green-d);color:#eef7f2;border-radius:var(--r);padding:15px 17px;margin-top:12px;
  font-family:var(--serif);font-size:16px;line-height:1.7;animation:zoomy .5s}
.quote-pop small{display:block;font-family:var(--sans);font-size:11px;opacity:.8;margin-top:6px}
.map21{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:12px}
.map21 .cell{aspect-ratio:1;border-radius:8px;background:var(--paper2);display:grid;place-items:center;
  font-size:15px;position:relative;border:1px solid var(--line);cursor:pointer}
.map21 .cell .d{position:absolute;top:2px;left:5px;font-size:8.5px;color:var(--ink3);font-weight:700}
.map21 .cell.hit{background:linear-gradient(165deg,#dcebe4,#b7d8cb);border-color:#9cc6b8}
.map21 .cell.sim{background:#eef2ef;border-style:dashed;opacity:.85}
.map21 .cell.today{outline:2px solid var(--clay);outline-offset:1px}
.feelmap i{background:#e9e2d2}
.feelmap i.hit{background:var(--clay)}
.badge-row{display:flex;gap:10px;margin-top:12px}
.badge{flex:1;text-align:center;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 4px}
.badge .ic{font-size:24px;filter:grayscale(1);opacity:.4}
.badge.lit .ic{filter:none;opacity:1}
.badge p{font-size:10.5px;color:var(--ink3);margin-top:3px;line-height:1.35;font-weight:600}
.badge.lit p{color:var(--green-d)}
.story-card{font-size:13.5px;color:var(--ink2);line-height:1.7;margin-top:8px}
.story-card b{color:var(--ink)}
.broadcast{background:linear-gradient(135deg,#2c3a33,#1f2b26);color:#d7e5dd;border-radius:var(--r);padding:15px 17px;margin-top:14px;font-size:13.5px;line-height:1.7}
.broadcast .k{font-size:10.5px;letter-spacing:.14em;color:#8fb8a4;font-weight:700;margin-bottom:6px}
.feel-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.feel-tags button{border:1.5px solid var(--line2);border-radius:999px;padding:11px 17px;font-size:15px;color:var(--ink2);background:var(--card);min-height:44px}
.feel-tags button.on{border-color:var(--clay);background:var(--clay-wash);color:var(--clay-d);font-weight:700}
.feel-input{width:100%;border:1.5px solid var(--line2);border-radius:11px;padding:10px 12px;margin-top:10px;
  background:var(--card);resize:vertical;min-height:56px;line-height:1.5}
.result-blocked{border:1.5px solid #c0392b;background:#fdf1ef;color:#8f2318;border-radius:11px;padding:10px 13px;
  font-size:12.5px;line-height:1.55;margin-top:9px;animation:fadein .2s}
.milestone{background:linear-gradient(135deg,var(--green-wash),#fffdf8);border:1.5px solid var(--green-l);
  border-radius:var(--r);padding:16px;margin-top:14px;text-align:center}
.milestone .ic{font-size:38px}
.milestone h4{font-family:var(--serif);font-size:18px;margin-top:6px;color:var(--green-d)}
.milestone p{font-size:12.5px;color:var(--ink2);margin-top:5px}

/* 凭证 / 分享卡 */
.cert{background:linear-gradient(160deg,#fffdf8,#f2ecdd);border:2px solid var(--green-d);border-radius:18px;
  padding:22px 18px;margin-top:14px;text-align:center;position:relative}
.cert .k{font-size:12px;letter-spacing:.28em;color:var(--green);font-weight:800}
.cert h3{font-family:var(--serif);font-size:22px;margin-top:8px}
.cert .sub{font-size:13px;color:var(--ink3);margin-top:2px}
.cert .row{display:flex;justify-content:center;gap:22px;margin-top:12px}
.cert .row div b{font-family:var(--serif);font-size:24px;color:var(--green-d);display:block}
.cert .row div span{font-size:12.5px;color:var(--ink3)}
.cert .say{font-family:var(--serif);font-size:15px;color:var(--ink2);margin-top:12px}
.watermark{font-size:12.5px;color:var(--ink3);border-top:1px dashed var(--line2);margin-top:14px;padding-top:8px;line-height:1.5}
.sharecard{background:linear-gradient(150deg,#1d7a5f,#2a9d7c);color:#fff;border-radius:18px;padding:20px 18px;margin-top:12px;text-align:center;box-shadow:var(--shadow)}
.sharecard h4{font-family:var(--serif);font-size:19px;line-height:1.45}
.mini-map{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:12px auto 0;max-width:200px}
.mini-map i{aspect-ratio:1;border-radius:3px;background:rgba(255,255,255,.22)}
.mini-map i.hit{background:#ffe9c7}
.cert .mini-map i{background:#e9e2d2}
.cert .mini-map i.hit{background:var(--green-l)}
.sharecard .wm{font-size:9.5px;opacity:.75;margin-top:12px;line-height:1.5;border-top:1px dashed rgba(255,255,255,.35);padding-top:8px}
.cap-list{display:flex;flex-direction:column;gap:8px;margin-top:10px}
.cap-list label{display:flex;gap:9px;align-items:flex-start;background:var(--card);border:1.5px solid var(--line);
  border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.5;cursor:pointer}

/* 深合并：旧版本 localStorage 结构缺字段时逐层补默认值，不整块覆盖 */
function deepMerge(def,sav){
  if(Array.isArray(def)) return Array.isArray(sav)?sav:structuredClone(def);
  if(def&&typeof def==='object'){
    const o={};
    for(const k of Object.keys(def)) o[k]=(sav&&typeof sav==='object'&&!Array.isArray(sav)&&k in sav)?deepMerge(def[k],sav[k]):structuredClone(def[k]);
    if(sav&&typeof sav==='object'&&!Array.isArray(sav)) for(const k of Object.keys(sav)) if(!(k in o)) o[k]=sav[k];
    return o;
  }
  return sav===undefined?structuredClone(def):sav;
}
let S=load();
function load(){
  let raw=null;
  try{ raw=JSON.parse(localStorage.getItem(LS_KEY)||'null'); }catch(e){ raw=null; }
  /* v1 单营 → v2 多营迁移（旧感受按天序 → 按日期；见证 → 按营） */
  try{
    if(raw&&raw.camp&&raw.camp.joined){
      const oc=raw.camp;
      raw.camps=[{theme:oc.theme||'water',campId:oc.campId||'pilot',mid:oc.mid||null,joinDate:oc.joinDate||null,
        anchor:oc.anchor||null,weakDay:oc.weakDay||null,pact:!!oc.pact,day0:!!oc.day0,
        completed:!!oc.completed,completedAt:oc.completedAt||null,checkins:oc.checkins||{},makeupUsed:oc.makeupUsed||{}}];
      const nf={}; const jd=oc.joinDate;
      if(raw.priv&&jd&&/^\d{4}-\d{2}-\d{2}$/.test(jd)){
        for(const[di,v]of Object.entries(raw.priv.feelTags||{})){ const ds=dateAdd(jd,+di); nf[ds]=nf[ds]||{tags:[],text:''}; nf[ds].tags=Array.isArray(v)?v:[]; }
        for(const[di,v]of Object.entries(raw.priv.feelText||{})){ const ds=dateAdd(jd,+di); nf[ds]=nf[ds]||{tags:[],text:''}; nf[ds].text=String(v||''); }
      }
      const w={}; if(raw.priv&&typeof raw.priv.witness==='string'&&raw.priv.witness) w[(oc.campId||'pilot')+'|'+(oc.theme||'water')]=raw.priv.witness;
      raw.priv={feel:nf,witness:w};
      delete raw.camp;
    }
  }catch(e){}
  let st;
  try{ st=raw?deepMerge(DEFAULT_STATE,raw):structuredClone(DEFAULT_STATE); }
  catch(e){ st=structuredClone(DEFAULT_STATE); }
  /* 结构净化：坏元素隔离，不让旧数据崩页 */
  st.selfcheck.answers=(Array.isArray(st.selfcheck.answers)?st.selfcheck.answers:[]).filter(a=>a&&typeof a.dim==='string'&&Number.isFinite(a.score));
  st.camps=(Array.isArray(st.camps)?st.camps:[]).filter(c=>c&&typeof c==='object'&&typeof c.theme==='string').map(c=>{
    const cks={};
    if(c.checkins&&typeof c.checkins==='object')
      for(const [k,v] of Object.entries(c.checkins)) if(/^\d+$/.test(k)&&v&&typeof v.tag==='string') cks[k]={tag:LEGAL_TAGS.includes(v.tag)?v.tag:'🌱',makeup:!!v.makeup};
    c.checkins=cks;
    c.makeupUsed=(c.makeupUsed&&typeof c.makeupUsed==='object')?c.makeupUsed:{};
    if(c.srv&&(typeof c.srv!=='object'||typeof c.srv.token!=='string')) delete c.srv;
    return c;
  });
  if(!st.priv||typeof st.priv!=='object') st.priv={feel:{},witness:{}};
  if(typeof st.priv.witness!=='object'||st.priv.witness===null) st.priv.witness={};
  if(typeof st.priv.feel!=='object'||st.priv.feel===null) st.priv.feel={};
  st.leftRevoke=(Array.isArray(st.leftRevoke)?st.leftRevoke:[]).filter(t=>typeof t==='string');
  return st;
}

/* 私有键净化：任何进入事件流水的对象，递归剔除私有命名的键（工程锁，而非约定） */
const PRIV_KEY_RE=/priv|feel|witness|体感|感受/i;
function scrub(v){
  if(Array.isArray(v))return v.map(scrub);
  if(v&&typeof v==='object'){const o={};for(const[k,x]of Object.entries(v)){if(PRIV_KEY_RE.test(k))continue;o[k]=scrub(x);}return o;}
  return v;
}
function track(ev,data){
  S.events.push({t:new Date().toISOString(),ev,data:data?scrub(data):null}); save();
}

let modalPrevFocus=null;
const MODAL_FOCUSABLE='button,a[href],input,select,textarea,[tabindex]:not([tabindex="-1"])';
function openModal(html){
  const already=$('#modal-root').classList.contains('show');
  if(!already) modalPrevFocus=document.activeElement;   /* 已开时不覆盖首次触发元素：重复/延时开窗后仍能还原到原 opener */
  const box=$('#modal-box'); box.innerHTML=html; $('#modal-root').classList.add('show');
  ['view-c','ctabbar'].forEach(id=>{const el=document.getElementById(id); if(el) el.setAttribute('inert','');});  /* 背景 inert：焦点/点击不逃到弹窗之外 */
  const head=box.querySelector('h2,h3,h4');           /* 对话框可访问名：关联内部标题，缺则回落 aria-label */
  if(head){ head.id='modaltitle'; box.setAttribute('aria-labelledby','modaltitle'); box.removeAttribute('aria-label'); }
  else { box.removeAttribute('aria-labelledby'); box.setAttribute('aria-label','对话框'); }
  const f=box.querySelector(MODAL_FOCUSABLE);
  (f||box).focus();
}
function closeModal(){
  if(!$('#modal-root').classList.contains('show')) return;
  $('#modal-root').classList.remove('show');
  ['view-c','ctabbar'].forEach(id=>{const el=document.getElementById(id); if(el) el.removeAttribute('inert');});
  const t=(modalPrevFocus&&modalPrevFocus.isConnected)?modalPrevFocus:document.querySelector('.sw:not([disabled])')||VC;
  if(t&&t.focus){ try{t.focus({preventScroll:true});}catch(e){} }   /* opener 已脱离 DOM 时回退到当前视图 */
  modalPrevFocus=null;
}
document.addEventListener('keydown',e=>{
  if(!$('#modal-root').classList.contains('show')) return;
  if(e.key==='Escape'){ closeModal(); return; }
  if(e.key==='Tab'){                                   /* 焦点陷阱：Tab 在对话框内首尾环绕，不逃到背景 */
    const box=$('#modal-box'), foc=[...box.querySelectorAll(MODAL_FOCUSABLE)].filter(el=>!el.disabled&&el.offsetParent!==null);
    if(!foc.length){ e.preventDefault(); box.focus(); return; }
    const first=foc[0], last=foc[foc.length-1], a=document.activeElement;
    if(!box.contains(a)){ e.preventDefault(); first.focus(); }
    else if(e.shiftKey&&a===first){ e.preventDefault(); last.focus(); }
    else if(!e.shiftKey&&a===last){ e.preventDefault(); first.focus(); }
  }
});
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* 幂等全量推送：≤21 条，服务端对已存在的日子直接忽略，不覆盖 */
let flushing={};
async function srvFlush(i){
  const c=S.camps[i];
  if(!API.on||!c||!c.srv||!c.srv.token||!S.auth.behavior) return;
  if(c.srv.needsReauth||c.srv.ended) return;   /* 被营主删除过 / 营期已结束：不自动动作 */
  const key=c.campId+'|'+c.mid;
  if(flushing[key]) return;                     /* single-flight：同营不并发推送，避免竞态与 sentN 回退 */
  flushing[key]=true;
  try{
    if(c.srv.optin!==true){
      /* reconsent 是一次性手势：请求发出即消费，网络重试不再携带，删除后不会误清新墓碑 */
      const rec=c.srv.reconsent===true; if(rec) delete c.srv.reconsent;
      const r0=await apiPost('/api/c/optin',rec?{on:true,reconsent:true}:{on:true},c.srv.token);
      if(!S.auth.behavior){ save(); return; }   /* await 期间用户已撤回：不再继续，撤回由 tick 补达 */
      if(r0&&r0.ok){ c.srv.optin=true; }
      else if(r0&&r0.code===410){ c.srv.optin=false; c.srv.needsReauth=true; c.srv.pending=false; save(); return; }
      else if(r0&&r0.code===498){ c.srv.ended=true; c.srv.pending=false; save(); return; }
      else { c.srv.pending=true; save(); return; }
    }
    const items=Object.entries(c.checkins).filter(([d])=>+d>=1&&+d<=21)
      .map(([d,v])=>({day:+d,tag:LEGAL_TAGS.includes(v.tag)?v.tag:'🌱',makeup:!!v.makeup}));
    if(items.length){
      const r=await apiPost('/api/c/checkins',{items},c.srv.token);
      if(!S.auth.behavior){ save(); return; }   /* await 期间撤回：不认为已同步，交给 revoke */
      if(!(r&&r.ok)){
        if(r&&r.code===403){ c.srv.optin=false; c.srv.needsReauth=true; c.srv.pending=false; save(); return; }
        if(r&&r.code===498){ c.srv.ended=true; c.srv.pending=false; save(); return; }
        c.srv.pending=true; save(); return;
      }
    }
    c.srv.pending=false; c.srv.sentN=items.length; c.srv.synced=new Date().toISOString(); save();
  }catch(e){ c.srv.pending=true; save(); }
  finally{ delete flushing[key]; }
}
async function srvRevoke(c){
  if(!API.on||!c.srv||!c.srv.token) return;
  try{ const r=await apiPost('/api/c/optin',{on:false},c.srv.token); if(r&&r.ok){ c.srv.optin=false; c.srv.pendingRevoke=false; c.srv.mustRevoke=false; save(); } }
  catch(e){ c.srv.pendingRevoke=true; save(); }
}
/* 退营队列：营已从本地移除，凭证仍需把服务端置为终态"已退营"直到确认。
   走 /api/c/leave（终态）而非 optin off——一旦服务端置 user_left，任何迟到的开授权都被 410 拒绝，
   与请求到达顺序无关，营主看板永久不可见（修 in-flight srvFlush 竞态）。 */
const revoking={};
function drainLeftRevoke(){
  if(!API.on||!Array.isArray(S.leftRevoke)||!S.leftRevoke.length) return;
  if(S.leftRevoke.length>50) S.leftRevoke=[...new Set(S.leftRevoke)].slice(-50);   /* 去重 + 上限，防无限累积 */
  for(const tok of [...S.leftRevoke]){
    if(revoking[tok]) continue;                                                    /* single-flight：同一凭证不并发/不悬挂叠加 */
    revoking[tok]=true;
    apiPost('/api/c/leave',{},tok).then(r=>{
      if(r&&(r.ok||r.code===401||r.code===410)){ S.leftRevoke=S.leftRevoke.filter(t=>t!==tok); save(); }
    }).catch(()=>{}).finally(()=>{ delete revoking[tok]; });
  }
}
/* 退出这一关：清本地记录 + 云端撤回（可重新开同主题的营，重算 21 天） */
function quitCamp(i){
  const c=S.camps[i]; if(!c) return;
  if(!confirm(`退出「${themeOf(c.theme).name}」？这一关的本地打卡记录会清除；之后可以重新开一关，重新算 21 天。`)) return;
  if(c.srv&&c.srv.token&&!S.leftRevoke.includes(c.srv.token)) S.leftRevoke.push(c.srv.token);
  try{ delete S.priv.witness[witnessKey(c)]; }catch(e){}   /* 清本营私有见证，重进同主题不串用旧回顾 */
  S.camps.splice(i,1);
  track('camp_leave',{theme:c.theme,campId:c.campId});
  if(!S.camps.length) S.cstage=S.selfcheck.done?'match':'welcome';
  save(); drainLeftRevoke();
  toast('已退出这一关'); render();
}
/* 周期对账：断网补传、撤回补达（开关状态是唯一事实源） */
function srvSyncTick(){
  if(!API.on) return;
  drainLeftRevoke();
  S.camps.forEach((c,i)=>{
    if(!c.srv||!c.srv.token) return;
    /* 撤回是 fail-safe：本地缓存不可信（optin 应答可能丢失），mustRevoke 直到服务端确认才熄灭 */
    if(!S.auth.behavior){ if(c.srv.mustRevoke||c.srv.optin===true||c.srv.pendingRevoke) srvRevoke(c); return; }
    if(c.srv.ended||campDay(c)>22) return;   /* 营期结束：同步通道关闭，不再空转 */
    if(c.srv.pending||c.srv.optin!==true||localDays(c)!==(c.srv.sentN||0)) srvFlush(i);
  });
}

    <div id="restmsg"></div>
    <button class="cbtn" style="margin-top:12px" onclick="doRestore()">恢复</button>`);

async function doRestore(){
  const raw=($('#restin').value||'').trim();
  const fail=t=>{ const el=$('#restmsg'); if(el) el.innerHTML=`<div class="result-blocked">${esc(t)}</div>`; };
  let obj=null;
  try{
    if(!raw.startsWith('XSJR.')||raw.length>4000) throw 0;
    obj=JSON.parse(decodeURIComponent(escape(atob(raw.slice(5).replace(/-/g,'+').replace(/_/g,'/')))));
  }catch(e){ fail('恢复码无法解析'); return; }
  const toks=(obj&&obj.v===1&&Array.isArray(obj.t)?obj.t:[])
    .filter(t=>typeof t==='string'&&t.startsWith('m.')&&t.length<160).slice(0,6);
  if(!toks.length){ fail('恢复码里没有可用凭证'); return; }
  /* 恢复前若本机已有"授权关着"的云营，绝不因恢复而自动打开总闸（会连带把它也重新授权） */
  const hadOffCloud=S.camps.some(c=>c.srv&&c.srv.token&&c.srv.optin!==true&&!c.srv.needsReauth&&!c.srv.ended);
  let added=0,skipped=0,anyOpt=false;
  for(const t of toks){
    try{
      const r=await apiGet('/api/c/camp',t);
      if(!r||!r.ok){ skipped++; continue; }
      if(r.left){ skipped++; continue; }   /* 已退营的营不恢复 */
      if(S.camps.some(c=>c.campId===r.campId&&c.mid===r.mid)){ skipped++; continue; }
      const jd=/^\d{4}-\d{2}-\d{2}$/.test(r.joinDate)?r.joinDate:todayStr();
      const theme=['water','sleep','sun'].includes(r.theme)?r.theme:'water';
      if(activeThemes().has(theme)&&campDay({joinDate:jd})<=21){ skipped++; continue; } /* 一主题一关的入营不变式 */
      const cks={},mk={};
      for(const [d,v] of Object.entries(r.checkins||{})){
        if(/^\d+$/.test(d)&&v&&typeof v.tag==='string'){ cks[d]={tag:LEGAL_TAGS.includes(v.tag)?v.tag:'🌱',makeup:!!v.makeup}; if(v.makeup&&+d>=1) mk[d]=true; }
      }
      if(!cks[0]) cks[0]={tag:'🌱',makeup:false};
      const srv={token:t,optin:!!r.optin,sentN:Object.keys(cks).filter(d=>+d>=1&&+d<=21).length};
      if(r.deleted) srv.needsReauth=true;   /* 曾被营主删除：恢复后同步保持停止，等用户亲手重拨开关 */
      S.camps.push({theme,campId:String(r.campId||'').slice(0,32),mid:r.mid,joinDate:jd,anchor:null,weakDay:null,
        pact:true,day0:true,completed:false,completedAt:null,checkins:cks,makeupUsed:mk,srv});
      if(r.optin&&!r.deleted) anyOpt=true;
      if(r.nick&&!S.nick&&validatePublicText(r.nick)) S.nick=String(r.nick).slice(0,12);
      added++;
    }catch(e){ skipped++; }
  }
  if(added){
    let deferAuth=false;
    if(anyOpt&&!S.auth.behavior){
      if(hadOffCloud){ deferAuth=true; }   /* 有关着的云营：不自动开总闸，交回用户决定 */
      else { S.auth.behavior=true; S.auth.log.push({t:new Date().toISOString(),act:'auth_grant',scope:'打卡行为记录（随云端恢复延续）'}); }
    }
    S.cstage='camp'; S.ctab='today'; save(); closeModal();
    toast(deferAuth?`已恢复 ${added} 个营——请到「我的」打开授权开关继续同步`:`已恢复 ${added} 个营${skipped?`（跳过 ${skipped} 个）`:''}`); render();
  } else fail('没有恢复到任何营'+(skipped?`（${skipped} 个凭证无效或已存在）`:''));
}

/* 围栏1：URL 参数剥离 —— 只认 campId / inviteToken，归因参数一律丢弃 */
function stripUrlParams(){
  try{
    const sp=new URLSearchParams(location.search);
    const stripped=[...sp.keys()].filter(k=>!['campId','inviteToken'].includes(k));
    if(stripped.length){
      const clean=new URLSearchParams();
      ['campId','inviteToken'].forEach(k=>{if(sp.has(k))clean.set(k,sp.get(k));});
      history.replaceState(null,'',location.pathname+(clean.toString()?'?'+clean.toString():''));
      toast('已移除无关参数');
    }
    /* invite_open 的真实语义：带 inviteToken 打开页面（会话内去重，仅匿名总量） */
    if(sp.has('inviteToken')&&!sessionStorage.getItem('invite_seen')){
      sessionStorage.setItem('invite_seen','1');
      S.inviteOpens++; track('invite_open');
    }
    if(sp.has('campId')) S.entry.campId=String(sp.get('campId')).slice(0,32);
    if(sp.has('inviteToken')) S.entry.inviteToken=String(sp.get('inviteToken')).slice(0,32);
    save();
  }catch(e){}
}
/* 围栏2：邀请链接生成函数 —— 硬编码仅两参数，函数签名上就不存在归因入口 */
function makeInviteLink(){
  const t=S.entry.inviteToken||Math.random().toString(36).slice(2,8);
  return location.origin+location.pathname+'?campId='+encodeURIComponent(S.entry.campId||'pilot')+'&inviteToken='+encodeURIComponent(t);
}
/* 围栏3：公开分享卡渲染器 —— 白名单入参。分数/雷达/信号灯/体感字段在代码层不可达 */
const SHARE_WHITELIST=['type','date','dayN','streak','mapTags','theme'];
function renderShareCard(payload){
  const extra=Object.keys(payload).filter(k=>!SHARE_WHITELIST.includes(k));
  if(extra.length) return {ok:false,reason:'白名单模板拒收字段：'+extra.join('、')};
  /* 键名 + 值类型双重校验：只放行行为字段的合法取值 */
  const p={};
  p.type=['selfcheck','companion','poster'].includes(payload.type)?payload.type:'selfcheck';
  p.date=/^\d{4}-\d{2}-\d{2}$/.test(payload.date||'')?payload.date:todayStr();
  p.dayN=Math.max(0,Math.min(21,Number(payload.dayN)||0));
  p.streak=Math.max(0,Math.min(21,Number(payload.streak)||0));
  p.theme=Object.prototype.hasOwnProperty.call(THEMES,payload.theme)?payload.theme:'water';
  p.mapTags={};
  const legalTags=TAGS.map(t=>t[0]).concat('🌱');
  if(payload.mapTags&&typeof payload.mapTags==='object')
    for(let i=1;i<=21;i++) if(legalTags.includes(payload.mapTags[i])) p.mapTags[i]=payload.mapTags[i];
  const campName=`21 天${THEMES[p.theme].name}`;
  let body='';
  if(p.type==='selfcheck'){
    body=`<h4>我完成了生活方式自检</h4><p style="opacity:.85;font-size:13px;margin-top:6px">${esc(p.date)}</p>`;
  }else if(p.type==='companion'){
    body=`<h4>${p.dayN>0?`我在第 ${p.dayN} 天，一起？`:'我刚上路，一起？'}</h4>${miniMap(p.mapTags)}`;
  }else{
    body=`<h4>小事做成了，大事才敢信你</h4><p style="opacity:.85;font-size:13px;margin-top:6px">我在 ${campName} · 第 ${p.dayN} 天</p>${miniMap(p.mapTags)}`;
  }
  /* 水印由渲染函数拼进模板：无水印即不出图 */
  return {ok:true,html:`<div class="sharecard">${body}<div class="wm">${WATERMARK}</div></div>`};
}
function miniMap(tags){
  tags=tags||{};
  return `<div class="mini-map">${Array.from({length:21},(_,i)=>`<i class="${tags[i+1]?'hit':''}"></i>`).join('')}</div>`;
}

/* 围栏5：命名禁词 DOM 扫描（.redline-edu 的“禁语教育”区除外） */
function scanNaming(){
  const walker=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT);
  const hits=[];
  while(walker.nextNode()){
    const n=walker.currentNode;
    if(n.parentElement&&n.parentElement.closest('.redline-edu,script,#blockbar'))continue;
    NAMING_BLOCKLIST.forEach(w=>{if(n.textContent.includes(w))hits.push(w);});
  }
  const bar=$('#blockbar');
  if(hits.length){
    console.error('[围栏] 命名禁词命中：',hits);
    bar.style.display='block';
    bar.textContent='⚠️ 围栏警报：界面文案命中命名禁词 '+[...new Set(hits)].join('、')+'（工程红线，须修复）';
  }else bar.style.display='none';
  return hits.length;
}

let answerLock=false, pendingQFocus=false;
function answer(i){
  if(answerLock) return;                                  /* 过场动画期间锁住，避免替未显示的下一题作答 */
  const idx=S.selfcheck.answers.length, q=QUESTIONS[idx];
  if(idx>=QUESTIONS.length||!q||!q.opts[i]) return;
  S.selfcheck.answers.push({dim:q.dim,score:q.opts[i][1]}); save();
  const per=dimProgress(), justDone=per[q.dim]===3;
  /* pendingQFocus 只在紧邻 render() 前置真（同步 set→render，不给过场期间的异步 render 提前消费的窗口，读屏播报 + 键盘可见） */
  if(justDone&&idx<QUESTIONS.length-1){
    const d=DIMS[DIM_IDX[q.dim]];
    const ov=h(`<div class="dim-pass"><div style="text-align:center"><div class="big">${ICN(d.key,'g',60)}</div><p>${d.pass}</p></div></div>`);
    document.body.appendChild(ov.firstElementChild);

function prefersReduced(){ return matchMedia('(prefers-reduced-motion: reduce)').matches; }
function drawRadar(box,sc){
  const size=280,cx=size/2,cy=size/2,R=100;
  const pt=(i,f)=>{const a=-Math.PI/2+i*Math.PI/3;return [cx+Math.cos(a)*R*f,cy+Math.sin(a)*R*f];};
  const ring=f=>Array.from({length:6},(_,i)=>pt(i,f).map(n=>n.toFixed(1)).join(',')).join(' ');
  const target=DIMS.map((d,i)=>sc[d.key]/9);
  const labels=DIMS.map((d,i)=>{const [x,y]=pt(i,1.24);const a=Math.cos(-Math.PI/2+i*Math.PI/3);const anc=a>.4?'start':(a<-.4?'end':'middle');return `<text x="${x}" y="${y+4}" text-anchor="${anc}" font-family="var(--serif)" font-size="12.5" fill="var(--ink2)">${d.name.slice(0,2)}</text>`;}).join('');
  box.innerHTML=`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" role="img" aria-label="六维生活方式雷达图">
    ${[1,.66,.33].map(f=>`<polygon points="${ring(f)}" fill="none" stroke="var(--line2)" stroke-width="1"/>`).join('')}
    ${Array.from({length:6},(_,i)=>{const[x,y]=pt(i,1);return `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="var(--line2)" stroke-width="1"/>`;}).join('')}
    <polygon id="radarpoly" points="${ring(0.02)}" fill="rgba(29,122,95,.28)" stroke="var(--green-d)" stroke-width="2" stroke-linejoin="round"/>
    ${labels}</svg>`;
  const poly=box.querySelector('#radarpoly');
  const setP=p=>{ /* 逐维生长：第 i 维在 p∈[i/6,(i+1)/6+缓冲] 内长出 */
    poly.setAttribute('points',target.map((tv,i)=>{
      const local=Math.max(0,Math.min(1,(p*7-i)/1.6));
      const ease=1-Math.pow(1-local,3);
      return pt(i,Math.max(.02,tv*ease)).map(n=>n.toFixed(1)).join(',');
    }).join(' '));
  };
  if(prefersReduced()){setP(1);return;}
  const t0=performance.now(),dur=1100;
  (function frame(t){const p=Math.min(1,(t-t0)/dur);setP(p);if(p<1)requestAnimationFrame(frame);})(t0);
}

const TAGS=[['☀️','晨起','dawn'],['🍜','饭前','meal'],['😮‍💨','忙里偷闲','breather'],['🌙','睡前','night']];
function dayMs(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d).getTime(); }
function dateAdd(iso,n){ const t=new Date(dayMs(iso)+n*86400000); return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`; }
function campDay(c){
  const jd=c&&c.joinDate;
  if(!jd||!/^\d{4}-\d{2}-\d{2}$/.test(jd)){ if(c){c.joinDate=todayStr();save();} return 0; }
  const diff=Math.round((dayMs(todayStr())-dayMs(jd))/86400000);
  if(!Number.isFinite(diff)||diff<0){ c.joinDate=todayStr(); save(); return 0; }
  return diff;
}
function checkedDaysC(c){ return Object.keys(c.checkins).filter(k=>+k>0).length; }
function checkedTo21(c){ let n=0; for(let i=1;i<=21;i++) if(c.checkins[i]) n++; return n; }
function streakC(c){
  const raw=campDay(c), t=Math.min(raw,21); let n=0;
  for(let d=t;d>=1;d--){
    if(c.checkins[d]) n++;
    else if(d===t&&raw<=21) continue;   /* 营期内：今天还没打不算断 */
    else break;
  }
  return n;
}

function nextThemeCard(){

function checkin(i,tag,day){
  const c=S.camps[i]; if(!c) return;
  const raw=campDay(c);
  if(raw>21||raw<1) return;                              /* 营期外或开营日不打正卡 */
  const cur=raw;
  day=(day===undefined)?cur:day;
  if(day<1||day>21) return;
  const isMakeup=(day===cur-1);
  if(day!==cur&&!isMakeup) return;                       /* 只能打今天，或补昨天 */
  if(c.checkins[day]) return;
  if(isMakeup){ if(c.makeupUsed[day])return; c.makeupUsed[day]=true; }
  c.checkins[day]={tag,makeup:isMakeup};
  /* 完营判定：D1–D21 全有记录才成立，只触发一次 */
  if(checkedTo21(c)>=21&&!c.completed){ c.completed=true; c.completedAt=todayStr(); track('camp_complete',{theme:c.theme,campId:c.campId}); }
  save();
  track('checkin',{theme:c.theme,campId:c.campId,day,tag,makeup:isMakeup});
  if(c.srv) srvFlush(i);
  render();
  const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
  const zone=$('#quotezone-'+i);
  if(zone) zone.innerHTML=`<div class="quote-pop">「${q}」<small>—— 明日内容已解锁</small></div>`;
  if(day===1&&!isMakeup) setTimeout(()=>openModal(`
    <h3 style="font-family:var(--serif);font-size:20px;display:flex;align-items:center;gap:8px">${ICN('spark','g',22)} 第一天，成了</h3>
    <p style="margin-top:10px;font-size:14px;color:inherit;opacity:.85">给你留了一条欢迎语音：</p>
    <div class="script-card" style="background:var(--paper2);border:1px dashed var(--line2);color:var(--ink)"><span style="display:inline-flex;vertical-align:-4px;margin-right:4px">${ICN('sound','',16)}</span>「21 天很短，就做一件小事。我陪你。」<br><span style="font-size:11px;opacity:.7">（内测版为文字，正式版为营主真人语音）</span></div>
    <button class="cbtn" style="margin-top:14px" onclick="closeModal()">收下了</button>`),650);
  /* 今日全勤（多关时的加强反馈，一天最多庆祝一次） */
  const started=activeCamps().filter(x=>campDay(x.c)>=1);
  if(started.length>1&&started.every(x=>doneToday(x.c))&&S.lastPerfect!==todayStr()){
    S.lastPerfect=todayStr(); save(); track('perfect_day',{n:started.length});
    setTimeout(()=>toast('今日全勤！'+started.length+' 关全部完成'),900);
  }
}
function milestoneHTML(c,i){
  const days=checkedDaysC(c);
  const ms=[[3,'sprout','三天，你已赢过一半人','很多人第 3 天就散了，你还在。'],[7,'leaf','一周达成','第一周是最难的一段，你走完了。'],[21,'medal','21 天完营','你亲手把「时间」填进了那道公式。']];
  const hit=ms.find(([n])=>days===n);
  if(!hit)return '';
  const [n,ik,tt,pp]=hit;
  return `<div class="milestone" style="margin-top:12px"><div class="ic">${ICN(ik,'g',38)}</div><h4>${tt}</h4><p>${pp}</p>

}

async function clearAllData(){
  if(!confirm('清空本机全部记录？不可恢复。')) return;
  /* 退营终态守护：有未送达的退营凭证时，必须先确认送达再清空——否则清掉唯一凭证，营主将永远看得到已退营的你 */
  if(Array.isArray(S.leftRevoke)&&S.leftRevoke.length){
    if(!API.on){ toast('你还有未送达的退营请求；请联网后自动完成，再清空本机'); return; }
    for(const t of [...S.leftRevoke]){
      try{ const r=await apiPost('/api/c/leave',{},t); if(r&&(r.ok||r.code===401||r.code===410)) S.leftRevoke=S.leftRevoke.filter(x=>x!==t); }catch(e){}
    }
    save();
    if(S.leftRevoke.length){ toast('退营请求还没送达服务器，先别清空——联网后会自动完成'); return; }
  }
  localStorage.removeItem(LS_KEY); location.reload();
}
function saveNick(){
  const v=$('#nickin').value.trim().slice(0,12);
  if(v&&!validatePublicText(v)){ toast('这个称呼里有不能对外的词，换一个吧'); return; }
  S.nick=v; save(); toast('记住了');
  if(API.on) S.camps.forEach(c=>{ if(c.srv&&c.srv.token) apiPost('/api/c/nick',{nick:v},c.srv.token).catch(()=>{}); });
}
/* 行为记录码：一营一码；白名单字段，结构上不存在分数/雷达/感受（工程锁） */
function makeAuthCode(i){
  const c=S.camps[i];
  if(!S.auth.behavior) return {ok:false,reason:'行为授权未开启'};
  if(!c||!c.mid) return {ok:false,reason:'还没有入营'};
  if(campDay(c)>21) return {ok:false,reason:'该营 21 天已结束，授权随营期自动失效'};
  const nick=validatePublicText(S.nick)?(S.nick||'').slice(0,12):'';
  const payload={v:1,campId:(c.campId||'pilot').slice(0,32),mid:c.mid,nick,
    days:Object.keys(c.checkins).map(Number).filter(n=>n>=1&&n<=21).sort((a,b)=>a-b),
    streak:streakC(c),updatedAt:todayStr()};
  return {ok:true,code:'XSJ1.'+btoa(unescape(encodeURIComponent(JSON.stringify(payload)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'')};
}
function showAuthCode(i){
  const res=makeAuthCode(i);
  if(!res.ok){ toast(res.reason); render(); return; }
  const c=S.camps[i];
  track('authcode_gen',{theme:c.theme,campId:c.campId,mid:c.mid,days:checkedDaysC(c)});
  openModal(`
    <h3 style="font-size:18px">行为记录码 · ${themeOf(c.theme).name}</h3>
    <p style="font-size:13px;opacity:.8;margin-top:8px">点击下框全选 → 复制 → 微信发给<b>这个营</b>的营主。想撤回时，关掉授权开关并告诉营主删除即可。</p>
    <textarea class="feel-input" readonly style="min-height:110px;font-family:var(--mono);font-size:11px;word-break:break-all" onclick="this.select()">${esc(res.code)}</textarea>
    <button class="cbtn" style="margin-top:12px" onclick="closeModal()">收起</button>`);
}
function complain(){
  openModal(`<h3 style="font-size:18px">投诉 / 举报</h3>
    <p style="font-size:13px;opacity:.8;margin-top:8px">告诉平台发生了什么（内测版留痕在本机，正式版直达平台审计后台，不经过营主）：</p>
    <textarea class="feel-input" id="cmptext" placeholder="例如：营里有人承诺疗效 / 被推销了……"></textarea>
    <button class="cbtn" style="margin-top:12px" onclick="submitComplain()">提交</button>`);
}
function submitComplain(){
  const v=($('#cmptext').value||'').trim();
  if(!v){ toast('写一句发生了什么再提交'); return; }
  S.complaintsList.push({t:new Date().toISOString(),text:v}); save();
  track('complaint_submit');
  closeModal(); toast('已提交并留痕（共 '+S.complaintsList.length+' 条）');
}

/* ---------- S7 结营凭证 / 私有回顾（按营） ---------- */
function witnessKey(c){ return (c.campId||'pilot')+'|'+(c.theme||'water'); }
function showCert(i){
  const c=S.camps[i]; if(!c)return;
  const days=checkedDaysC(c);
  let longest=0,cur=0; for(let j=1;j<=21;j++){cur=c.checkins[j]?cur+1:0;longest=Math.max(longest,cur);}
  openModal(`
    <div class="cert">
      <p class="k">21 天打卡完成凭证</p>
      <h3>行为记录</h3>
      <p class="sub">${esc(S.nick||'我')} · ${esc(c.joinDate||todayStr())} 开营 → ${esc(c.completedAt||todayStr())} 结营 · 21 天${themeOf(c.theme).name}</p>
      <div class="row"><div><b class="num">${days}</b><span>打卡天数</span></div><div><b class="num">${longest}</b><span>最长连续</span></div></div>
      ${miniMap(Object.fromEntries(Object.entries(c.checkins).map(([k,v])=>[k,v.tag])))}
      <p class="say">「你亲手把『时间』填进了那道公式。」</p>
      <div class="watermark">${WATERMARK}</div>
    </div>
    <p class="small-note" style="margin-top:12px">想继续练下一关、或想系统学健康观念的，可以私信营主「继续」，会收到一份通用介绍，不勉强。</p>
    <button class="cbtn" style="margin-top:12px" onclick="closeModal()">收好了</button>`);
}
function showReview(i){
  const c=S.camps[i]; if(!c)return;
  const days=checkedDaysC(c);
  let feelDays=0;
  if(c.joinDate&&/^\d{4}-\d{2}-\d{2}$/.test(c.joinDate)){
    for(let j=1;j<=21;j++){ const f=S.priv.feel[dateAdd(c.joinDate,j)]; if(f&&((f.tags&&f.tags.length)||(f.text&&f.text.trim()))) feelDays++; }
  }
  openModal(`
    <h3 style="font-family:var(--serif);font-size:20px;display:flex;align-items:center;gap:8px">${ICN('lock','g',20)} 我的 21 天 · ${themeOf(c.theme).name}（仅本人）</h3>
    <p style="margin-top:10px;font-size:14px">打卡 <b class="num">${days}</b> 天 · 给自己写过 <b class="num">${feelDays}</b> 天感受</p>
    <p style="font-size:13px;opacity:.8;margin-top:8px">21 天前，我以为一件小事没用。21 天后，我最想说的一句是：</p>
    <textarea class="feel-input" id="witnesstext" placeholder="原来我真的能坚持一件小事">${esc(S.priv.witness[witnessKey(c)]||'')}</textarea>
    <div id="witnessblocked"></div>
    <p class="small-note">这句话只存在你自己手机里，不会被引导发到任何群。</p>
    <button class="cbtn" style="margin-top:12px" onclick="saveWitness(${i})">存给自己</button>`);
}
function saveWitness(i){
  const c=S.camps[i]; if(!c)return;
  const v=$('#witnesstext').value;
  if(therapyBlock(v)){ $('#witnessblocked').innerHTML=`<div class="result-blocked">${COLD_SCRIPT}<br><span style="font-size:11px;opacity:.8">这句里有疗效词，存不进去——坚持可以夸，疗效不能记。</span></div>`; return; }
  S.priv.witness[witnessKey(c)]=v; save(); closeModal(); toast('存好了，只属于你');
}

/* ---------- S8 公开分享卡（白名单，按营） ---------- */
function copyShare(){
  const cap=document.querySelector('#caplist input:checked');
  const text=(cap?cap.closest('label').textContent.trim():'')+'\n'+makeInviteLink();
  const done=()=>{closeModal();toast('已复制：邀请话术 + 链接（链接只有 campId / inviteToken 两个参数）');};
  try{ navigator.clipboard.writeText(text).then(done,()=>{fallbackCopy(text);done();}); }
  catch(e){ fallbackCopy(text); done(); }
}
function fallbackCopy(t){
  const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');}catch(e){}
  ta.remove();
}
function openShare(type,ci){
  let c=null;
  if(type!=='selfcheck'){
    if(ci===undefined){ const a=activeCamps(); ci=a.length?a[0].i:(S.camps.length?0:undefined); }
    c=(ci!==undefined)?S.camps[ci]:null;
    if(!c) type='selfcheck';
  }
  if(type==='selfcheck'&&!(S.selfcheck.done&&S.selfcheck.scores)){ toast('先做完自检，才能生成这张卡'); return; }
  const days=c?checkedDaysC(c):0, st=c?streakC(c):0;
  const mapTags=c?Object.fromEntries(Object.entries(c.checkins).map(([k,v])=>[k,v.tag])):{};
  const payload = type==='selfcheck' ? {type,date:todayStr()} : {type,dayN:days,streak:st,mapTags,theme:(c&&c.theme)||'water'};
  const res=renderShareCard(payload);
  if(!res.ok){toast(res.reason);return;}
  track('share_card_gen',{type});
  openModal(`
    <h3 style="font-size:18px">公开分享卡（只含行为信息）</h3>
    ${res.html}
    <p class="c-kicker" style="margin-top:16px">配句话（四选一，不可改）</p>
    <div class="cap-list" id="caplist">
      ${CAPTIONS.map((cc,i)=>`<label class="${i===0?'on':''}"><input type="radio" name="cap" ${i===0?'checked':''} onchange="[...document.querySelectorAll('#caplist label')].forEach((l,j)=>l.classList.toggle('on',j===${i}))"><span>${esc(cc.replace('{N}',String(days||1)))}</span></label>`).join('')}
    </div>
    <button class="cbtn" style="margin-top:14px" onclick="copyShare()">复制邀请话术和链接</button>
    <p class="small-note" style="text-align:center">链接：${makeInviteLink().replace('https://','').replace('http://','')}</p>
    <button class="cbtn ghost" onclick="closeModal()">这次先不发</button>`);
}

/* ============================================================
   总渲染 & 初始化
============================================================ */
function render(){ renderC(); scheduleScan(); }
stripUrlParams();
render();
apiDetect();
setInterval(srvSyncTick,25000);
window.addEventListener('online',()=>{ if(!API.on) apiDetect(); else srvSyncTick(); });
</script>
